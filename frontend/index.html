<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>First Click ERP</title>
    <script>
      (function () {
        try {
          var shellV = localStorage.getItem('fc_shell_version');
          if (shellV !== '15') {
            localStorage.setItem('fc_shell_version', '15');
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) { r.unregister(); });
              });
            }
            if ('caches' in window) {
              caches.keys().then(function (keys) {
                keys.forEach(function (k) { caches.delete(k); });
              });
            }
          }
        } catch (e) { /* ignore */ }
        try {
          var lang = localStorage.getItem('lang');
          if (lang === 'en') {
            document.documentElement.lang = 'en';
            document.documentElement.dir = 'ltr';
          } else {
            document.documentElement.lang = 'ar';
            document.documentElement.dir = 'rtl';
          }
        } catch (e) { /* ignore */ }
        try {
          var tid = localStorage.getItem('currentTenantId');
          var key = tid ? 'fc_ui_font_scale_t' + tid : null;
          var raw = key ? localStorage.getItem(key) : null;
          if (raw == null && tid) {
            var settingsRaw = localStorage.getItem('fc_settings_t' + tid);
            if (settingsRaw) {
              try {
                var settings = JSON.parse(settingsRaw);
                if (settings && settings.ui_font_scale_percent != null) {
                  raw = String(settings.ui_font_scale_percent);
                }
              } catch (e2) { /* ignore */ }
            }
          }
          var pct = raw ? parseFloat(raw) : 100;
          if (!isFinite(pct)) pct = 100;
          pct = Math.min(130, Math.max(75, Math.round(pct)));
          document.documentElement.style.setProperty('--ui-font-scale', String(pct / 100));
        } catch (e) {
          document.documentElement.style.setProperty('--ui-font-scale', '1');
        }
      })();
    </script>
    <style>
      :root { --ui-font-scale: 1; }
      html {
        font-size: calc(16px * var(--ui-font-scale, 1));
        height: 100%;
        text-size-adjust: 100%;
      }
      body, #root { height: 100%; min-height: 100%; margin: 0; min-width: 0; }
      #root { display: flex; flex-direction: column; }
      .app-shell-print-layout.fc-shell-ltr:not(.fc-shell-pos),
      .app-shell-print-layout.fc-shell-rtl:not(.fc-shell-pos) {
        display: grid;
        direction: ltr;
        align-items: stretch;
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
      }
      .app-shell-print-layout.fc-shell-ltr:not(.fc-shell-pos) {
        grid-template-columns: auto minmax(0, 1fr);
        grid-template-areas: 'fc-sidebar fc-main';
      }
      .app-shell-print-layout.fc-shell-rtl:not(.fc-shell-pos) {
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas: 'fc-main fc-sidebar';
      }
      .app-shell-print-layout.fc-shell-ltr:not(.fc-shell-pos) > aside,
      .app-shell-print-layout.fc-shell-rtl:not(.fc-shell-pos) > aside {
        grid-area: fc-sidebar;
      }
      .app-shell-print-layout.fc-shell-ltr:not(.fc-shell-pos) > .app-shell-print-main-column,
      .app-shell-print-layout.fc-shell-rtl:not(.fc-shell-pos) > .app-shell-print-main-column {
        grid-area: fc-main;
        min-width: 0;
      }
      .app-shell-print-layout.fc-shell-pos.flex {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root" class="no-print" aria-live="polite"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
