# First Click ERP — ضبط عام داخل http {} (يُنسخ إلى /etc/nginx/conf.d/)
# nginx -t && systemctl reload nginx

gzip_comp_level 6;
gzip_proxied any;

client_body_buffer_size 128k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

keepalive_timeout 65;
keepalive_requests 100;
send_timeout 60;

# لا تفعّل fastcgi_cache هنا — Laravel API ديناميكي ويحتاج استجابات حية
