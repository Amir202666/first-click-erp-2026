; First Click ERP — تجاوز إعدادات pool [www]
; يُنسخ إلى /etc/php/VERSION/fpm/pool.d/zz-firstclick-performance.conf

[www]
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 120
